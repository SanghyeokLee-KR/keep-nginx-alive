# inventory.example.ini — 복사해서 inventory.ini 로 쓰고 값만 채운다
#   cp inventory.example.ini inventory.ini
#
# CTF 경기 박스(#1)만 대상. #2/#3 은 SSH 차단이라 Ansible 접근 대상이 아니다
# (AMI 클론으로 동일 스택을 굽거나, 별도 배스천을 둔다).

[nginx_defense]
nginx-01 ansible_host=YOUR_SERVER_IP ansible_user=ubuntu ansible_ssh_private_key_file=~/.ssh/your-key.pem
