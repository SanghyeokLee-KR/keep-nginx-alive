# nginx.service drop-in override
#
# StartLimitIntervalSec / StartLimitBurst 는 systemd 229+ 에서 [Unit] 섹션 키다.
# (예전엔 [Service]에 있었으나 이동됨 — [Service]에 두면 "Unknown key"로 무시되어
#  레이트리밋이 실제로 적용/해제되지 않는 버그가 생긴다.)
#
# 의도: kill 연타에는 공격적으로 재기동하되, 근본적으로 깨진 바이너리가
#       무한 크래시 루프로 CPU를 태우는 건 막는다. 60초당 20회까지 허용하고,
#       초과 시 systemd는 잠시 멈춘다 — 그 이후의 지속 복구는 watchdog(5초)·
#       cron(1분)이 reset-failed + restart 로 이어받는다(거친 백오프 효과).
[Unit]
StartLimitIntervalSec=60
StartLimitBurst=20

[Service]
Restart=always
RestartSec=2
